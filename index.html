<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>جلسة مهدي و بنين | عالمنا الخاص</title>
  <style>
    :root {
      --bg-main: #fff9f7;
      --card-bg: rgba(255, 255, 255, 0.9);
      --card-soft: rgba(0, 0, 0, 0.02);
      --text-main: #3f295d;
      --text-muted: #8b7a9f;
      --accent: #ff7ea3; /* Soft Pink */
      --accent-2: #ffb84a; /* Warm Peach */
      --border-subtle: rgba(63, 41, 93, 0.1);
      --shadow-soft: 0 10px 30px rgba(139, 122, 159, 0.15);
      --radius-lg: 30px;
      --radius-md: 20px;

      --menu-bg: #fdeff2;
      --menu-border: rgba(255, 126, 163, 0.2);
      --menu-text: #5c3f7b;

      --list-bg: #fffefe;
      --list-item-bg: rgba(255, 239, 242, 0.6);
      --list-item-border: transparent;
    }

    :root[data-theme="dark"] {
      --bg-main: radial-gradient(circle at top left, #291a3c 0, #130c1f 50%, #050409 100%);
      --card-bg: rgba(22, 17, 36, 0.9);
      --card-soft: rgba(255, 255, 255, 0.04);
      --text-main: #fdfbff;
      --text-muted: #b4b0c9;
      --border-subtle: rgba(255, 255, 255, 0.07);
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.3);

      --menu-bg: rgba(41, 26, 60, 0.9);
      --menu-border: rgba(255, 255, 255, 0.1);
      --menu-text: #e4ddff;

      --list-bg: rgba(10, 7, 19, 0.9);
      --list-item-bg: rgba(255, 255, 255, 0.03);
      --list-item-border: rgba(255, 255, 255, 0.05);
    }
    
    :root[data-mode="love"] { --accent: #ff7ea3; --accent-2: #ffb84a; }
    :root[data-mode="engaged"] { --accent: #8b5bff; --accent-2: #4ad2ff; }
    :root[data-mode="married"] { --accent: #4aff9b; --accent-2: #ffd84a; }
    :root[data-mode="special"] { --accent: #ff7ee5; --accent-2: #7effff; }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Tajawal', system-ui, -apple-system, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      direction: rtl;
      transition: background 0.3s ease;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:wght@700&display=swap');

    /* === شاشة الترحيب الخاصة ببنين === */
    #banin-splash-screen {
        position: fixed;
        inset: 0;
        background-color: #0c0714;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: opacity 0.8s ease;
        text-align: center;
        padding: 2rem;
    }
    #banin-splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
    }
    .splash-layer {
        opacity: 0;
        animation: fadeIn 1.5s ease-out forwards;
        color: #f0d8ff;
        text-shadow: 0 0 15px rgba(224, 170, 255, 0.5);
    }
    #splash-layer-1 { font-size: 1.8rem; animation-delay: 0.5s; }
    #splash-layer-2 { font-size: 2.2rem; margin-top: 1rem; animation-delay: 2s; font-family: 'Amiri', serif; }
    #splash-layer-3 { font-size: 4.5rem; margin-top: 0.5rem; animation-delay: 3.5s; color: #ffc2e0; text-shadow: 0 0 25px rgba(255, 137, 190, 0.7); font-family: 'Amiri', serif; font-weight: 700; }
    #splash-layer-4 { font-size: 1.2rem; margin-top: 2rem; animation-delay: 5s; }
    #splash-layer-5 { font-size: 1rem; margin-top: 2.5rem; animation-delay: 6s; color: #ffb84a; border: 1px solid #ffb84a; padding: 0.5rem 1.5rem; border-radius: 999px; animation: fadeIn 1.5s ease-out forwards, pulse 2s infinite 7s; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 184, 74, 0.5); } 50% { transform: scale(1.05); box-shadow: 0 0 15px 5px rgba(255, 184, 74, 0); } }


    .app-shell { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.2rem 2.5rem; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 1.2rem; margin-bottom: 1.4rem; flex-wrap: wrap; }
    .logo-block { display: flex; align-items: center; gap: 0.7rem; }
    .logo-dot { width: 12px; height: 12px; border-radius: 999px; background: radial-gradient(circle, var(--accent), var(--accent-2)); box-shadow: 0 0 10px 4px rgba(255, 126, 163, 0.3); }
    .logo-text-main { font-weight: 700; font-size: 1.1rem; }
    .logo-text-sub { font-size: 0.8rem; color: var(--text-muted); }

    .top-bar-right { display: flex; flex: 1; gap: 0.6rem; justify-content: flex-end; flex-wrap: wrap; }
    .main-session-btn {
      flex: 1; min-width: 220px; border-radius: 999px; border: none; padding: 0.9rem 1.4rem; font-size: 1rem; font-weight: 700; color: #402316;
      cursor: pointer; position: relative; overflow: hidden; box-shadow: var(--shadow-soft); background: linear-gradient(135deg, var(--accent), var(--accent-2));
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .main-session-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(139, 122, 159, 0.25); }
    .main-session-meta { font-size: 0.78rem; color: #402316; opacity: 0.8; margin-top: 0.15rem; }

    .theme-toggle-btn {
        border-radius: 999px; border: 1px solid var(--menu-border); background: var(--menu-bg); color: var(--menu-text); font-size: 0.8rem;
        padding: 0.55rem 1rem; cursor: pointer; display: inline-flex; align-items: center; gap: 0.35rem; white-space: nowrap; transition: all 0.15s ease;
    }
    .theme-toggle-btn:hover { transform: translateY(-2px); border-color: var(--accent); }
    .btn-icon { font-size: 0.9rem; }

    .layout { display: grid; grid-template-columns: minmax(0, 350px) minmax(0, 1fr); gap: 1.3rem; }
    .card { background: var(--card-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow-soft); border: 1px solid var(--border-subtle); padding: 1.2rem 1.3rem; backdrop-filter: blur(10px); }
    .card-header-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.3rem; }
    .card-subtitle { font-size: 0.8rem; color: var(--text-muted); }

    /* موسيقى الجلسة */
    .session-music .card-header-title::before { content: "♪"; display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 999px; background: radial-gradient(circle, var(--accent-2), var(--accent)); font-size: 0.9rem; color: #fff; margin-left: 8px; }
    .music-dropzone { margin-top: 0.8rem; border-radius: 20px; border: 2px dashed var(--border-subtle); padding: 1rem 0.9rem; background: var(--card-soft); transition: all 0.2s ease; cursor: pointer; }
    .music-dropzone:hover, .music-dropzone.dragover { border-color: var(--accent); background: rgba(255, 126, 163, 0.05); }
    .music-dropzone-inner { display: flex; align-items: center; gap: 0.9rem; }
    .music-dropzone-icon { width: 44px; height: 44px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: 0 5px 15px rgba(255, 126, 163, 0.4); flex-shrink: 0; }
    .music-upload-btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.6rem 1.5rem; border-radius: 999px; border: none; background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #fff; font-size: 0.9rem; font-weight: 700; cursor: pointer; box-shadow: var(--shadow-soft); transition: all 0.15s ease; }
    .music-upload-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 126, 163, 0.3); opacity: 0.96; }
    .music-meta { margin-top: 0.8rem; padding: 0.7rem 0.8rem; border-radius: var(--radius-md); background: var(--list-item-bg); border: 1px solid var(--border-subtle); font-size: 0.82rem; }
    .music-icon-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border-subtle); background: #fff; color: var(--accent); font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
    .music-icon-btn:not([disabled]):hover { background: var(--list-item-bg); transform: scale(1.1); box-shadow: var(--shadow-soft); }
    #music-progress { height: 6px; background: var(--list-item-bg); }
    #music-progress::-webkit-slider-thumb { width: 14px; height: 14px; box-shadow: 0 0 0 5px rgba(255, 126, 163, 0.2); }
    #music-progress::-moz-range-thumb { width: 14px; height: 14px; box-shadow: 0 0 0 5px rgba(255, 126, 163, 0.2); }
    .toggle-slider { width: 40px; height: 22px; border-radius: 999px; background: var(--list-item-bg); position: relative; flex-shrink: 0; cursor: pointer; transition: background 0.15s ease; border: 1px solid var(--border-subtle); }
    .toggle-slider::before { content: ""; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: var(--text-muted); top: 2px; right: 2px; transition: all 0.2s ease; }
    .music-autoplay-toggle input:checked + .toggle-slider { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .music-autoplay-toggle input:checked + .toggle-slider::before { background: #fff; transform: translateX(-18px); }

    /* LoveBoard & Account */
    .loveboard-btn { border-radius: var(--radius-md); background: #fff; border: 1px solid var(--border-subtle); padding: 0.6rem 0.7rem; font-size: 0.8rem; color: var(--text-main); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s ease; font-weight: 700; }
    .loveboard-btn:hover { background: var(--list-item-bg); border-color: var(--accent); transform: translateY(-2px) scale(1.02); box-shadow: var(--shadow-soft); }
    .logout-btn { border-radius: 999px; padding: 0.5rem 1.1rem; border: 1px solid var(--border-subtle); background: #fff; color: var(--accent); font-size: 0.85rem; cursor: pointer; transition: all 0.15s ease; font-weight: 700; }
    .logout-btn:hover { background: rgba(255, 126, 163, 0.1); border-color: var(--accent); transform: translateY(-2px); }

    /* Session Settings */
    .relation-modes { gap: 0.4rem; border-radius: 999px; background: var(--menu-bg); padding: 0.3rem; border: 1px solid var(--menu-border); }
    .relation-mode-btn { border-radius: 999px; border: none; padding: 0.45rem 1rem; font-size: 0.8rem; cursor: pointer; background: transparent; color: var(--menu-text); transition: all 0.2s ease; font-weight: 700; }
    .relation-mode-btn.active { background: #fff; color: var(--accent); box-shadow: 0 4px 10px rgba(139, 122, 159, 0.1); }
    .pill-muted { border-radius: 999px; border: 1px solid var(--menu-border); padding: 0.25rem 0.8rem; font-size: 0.75rem; background: var(--menu-bg); color: var(--menu-text); }

    /* Questions */
    .search-wrapper { border-radius: 999px; background: var(--menu-bg); border: 1px solid var(--menu-border); }
    .mini-select { border-radius: 999px; border: 1px solid var(--menu-border); background: var(--menu-bg); color: var(--menu-text); padding: 0.45rem 0.65rem; font-size: 0.8rem; }
    .btn-soft { border-radius: 999px; border: none; padding: 0.55rem 1rem; font-size: 0.8rem; background: var(--menu-bg); color: var(--menu-text); cursor: pointer; display: inline-flex; align-items: center; gap: 0.35rem; transition: all 0.15s ease; white-space: nowrap; font-weight: 700; }
    .btn-soft:hover { transform: translateY(-2px); background: #fce2e8; }
    .btn-primary-soft { background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: 0 5px 15px rgba(255, 126, 163, 0.3); }
    .btn-primary-soft:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 126, 163, 0.4); }
    .question-display { border-radius: var(--radius-lg); background: #fff; border: 1px solid var(--border-subtle); min-height: 140px; box-shadow: inset 0 2px 10px rgba(139, 122, 159, 0.05); }
    .question-display-text { font-size: 1rem; font-weight: 700; }
    .questions-list { background: var(--list-bg); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); max-height: 380px; }
    .question-item { border-radius: var(--radius-md); padding: 0.7rem 0.8rem; margin-bottom: 0.5rem; background: #fff; border: 1px solid var(--border-subtle); transition: all 0.2s ease; }
    .question-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-soft); }
    .question-item.highlight { border-color: var(--accent); box-shadow: var(--shadow-soft); background: radial-gradient(circle at top right, rgba(255, 126, 163, 0.08), #fff); }
    .question-tag { border-radius: 999px; padding: 0.2rem 0.6rem; border: 1px solid var(--menu-border); background: var(--menu-bg); }
    
    /* Modals */
    .modal { background: #fffdfc; border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); max-width: 440px; }
    .btn-sm { border-radius: 999px; border: 1px solid var(--menu-border); background: var(--menu-bg); color: var(--menu-text); font-weight: 700; }
    .btn-sm:hover { background: #fce2e8; }
    .btn-danger { border-color: rgba(255, 102, 140, 0.7); background: rgba(255, 102, 140, 0.1); color: #c5456e; }
    
    /* Memories Page */
    .memories-overlay { background: rgba(255, 249, 247, 0.7); backdrop-filter: blur(15px); }
    .memories-panel { background: var(--card-bg); border-radius: var(--radius-lg); }
    .memory-item { background: #fff; border: 1px solid var(--border-subtle); }
    .memory-item textarea { font-size: 0.85rem; }

    /* Hide Login View */
    .login-view { display: none !important; }

    /* Other Inherited but Unchanged for brevity */
    .top-bar-small-buttons, .music-dropzone-text, .music-main-controls, .music-progress-wrapper, .music-volume-wrapper, .loveboard-grid,
    .session-settings-bottom, .questions-toolbar, .question-display-wrapper, .question-top-row, .question-meta-row, .question-actions,
    .modal-actions, .short-messages-list, .goals-list, .memories-header, .memories-list, .theme-presets-grid, .theme-custom-row,
    .timer-picker, .timer-quick-buttons, .toast-container
    { /* These classes exist and inherit the new look, but their specific layout styles are unchanged */ }

    .cursor::after { content: "|"; animation: blink 1s infinite; color: var(--accent); margin-right: 2px; }
    @keyframes blink { 50% { opacity: 0; } }

    @media (max-width: 960px) { .layout { grid-template-columns: minmax(0, 1fr); } .top-bar { flex-direction: column; align-items: stretch; } .top-bar-right { width: 100%; justify-content: flex-start; } .main-session-btn { width: 100%; } }
    @media (max-width: 640px) { .app-shell { padding-inline: 0.9rem; } .loveboard-grid { grid-template-columns: minmax(0, 1fr); } .questions-toolbar { flex-direction: column; align-items: stretch; } .search-wrapper { order: 1; } .question-display-wrapper { grid-template-columns: minmax(0,1fr); } .question-display-copy-btn { width: 100%; justify-content: center; } }
    
    /* Unchanged Utility Classes */
    #music-volume, #session-duration-range, #session-music-audio, .badge-counter, .music-time, .music-extra,
    .music-title-row, .music-title, .music-title-label, .toast, .account-card, .btn-back
    { /* Styles are kept for functionality */ }
    
    /* Re-pasted some styles for full functionality if copied alone */
    .music-dropzone-text { display: flex; flex-direction: column; gap: 0.35rem; }
    .music-drop-hint { font-size: 0.78rem; color: var(--text-muted); }
    .music-controls { margin-top: 0.75rem; display: none; flex-direction: column; gap: 0.6rem; }
    .music-main-controls, .music-volume-wrapper { display: flex; align-items: center; gap: 0.4rem; }
    .music-progress-wrapper { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 0.4rem; }
    .music-time { font-size: 0.76rem; color: var(--text-muted); }
    #music-progress, #music-volume { width: 100%; -webkit-appearance: none; appearance: none; height: 6px; border-radius: 999px; background: var(--list-item-bg); outline: none; }
    #music-progress::-webkit-slider-thumb, #music-volume::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; border-radius: 50%; background: var(--accent); cursor: pointer; }
    #music-progress::-webkit-slider-thumb { width: 14px; height: 14px; box-shadow: 0 0 0 5px rgba(255, 126, 163, 0.2); }
    #music-progress::-moz-range-thumb { width: 14px; height: 14px; border: none; box-shadow: 0 0 0 5px rgba(255, 126, 163, 0.2); }
    #music-volume::-webkit-slider-thumb { width: 12px; height: 12px; } #music-volume::-moz-range-thumb { width: 12px; height: 12px; border: none; }
    .music-autoplay-toggle { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.85rem; font-size: 0.78rem; color: var(--text-muted); }
    .music-autoplay-toggle input { display: none; }
    .toggle-label { cursor: pointer; }
    .loveboard-grid { margin-top: 0.8rem; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.6rem; }
    .loveboard-tag { font-size: 0.7rem; color: var(--text-muted); font-weight: 400;}
    .loveboard-note { margin-top: 0.6rem; font-size: 0.76rem; color: var(--text-muted); }
    .session-timer-banner { margin-bottom: 0.6rem; border-radius: 999px; background: var(--menu-bg); border: 1px solid var(--menu-border); padding: 0.35rem 0.75rem; font-size: 0.78rem; display: none; align-items: center; justify-content: space-between; gap: 0.5rem; color: var(--menu-text); }
    .questions-header { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .questions-header-badge { font-size: 0.75rem; color: var(--text-muted); }
    .questions-toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .search-wrapper input { border: none; background: transparent; color: var(--menu-text); font-size: 0.8rem; flex: 1; }
    .search-wrapper input::placeholder { color: rgba(139, 122, 159, 0.7); }
    .search-wrapper input:focus { outline: none; }
    .questions-ai-hint { font-size: 0.75rem; color: var(--text-muted); }
    .question-display-wrapper { margin-top: 0.6rem; margin-bottom: 0.4rem; display: grid; grid-template-columns: 1fr auto; gap: 0.6rem; align-items: stretch; }
    .question-display-placeholder { font-size: 0.85rem; color: var(--text-muted); }
    .question-display-copy-btn { align-self: center; height: fit-content; }
    .question-text { flex: 1; }
    .question-meta-row { display: flex; align-items: center; justify-content: space-between; gap: 0.4rem; font-size: 0.76rem; color: var(--text-muted); }
    .question-mode-label { font-size: 0.75rem; color: var(--text-muted); }
    .question-actions { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(86, 66, 109, 0.3); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 50; opacity: 0; transition: opacity 0.2s ease; }
    .modal-backdrop.open { display: flex; opacity: 1; }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .modal-body { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.9rem; }

    .toast.show { opacity: 1; transform: translateY(0); }
    
  </style>

<body>

<!-- شاشة الترحيب الخاصة ببنين -->
<div id="banin-splash-screen">
    <div id="splash-layer-1" class="splash-layer">لكِ...</div>
    <div id="splash-layer-2" class="splash-layer">يا من يكتمل بها عالمي...</div>
    <div id="splash-layer-3" class="splash-layer">بنين</div>
    <div id="splash-layer-4" class="splash-layer">من مهدي</div>
    <div id="splash-layer-5" class="splash-layer">اضغطي هنا لتبدأ رحلتنا</div>
</div>


<!-- التطبيق الرئيسي (كان مخفياً) -->
<div id="app-view" class="app-view">
  <div class="app-shell">
    <div class="top-bar">
      <div class="logo-block">
        <div class="logo-dot"></div>
        <div>
          <div class="logo-text-main" id="app-title">جلسة مهدي و بنين</div>
          <div class="logo-text-sub">عالمنا الخاص من الأسئلة، الموسيقى والذكريات.</div>
        </div>
      </div>
      <div class="top-bar-right">
        <button class="main-session-btn" id="start-session-btn" type="button">
          <span>مهدي وبنين: بدء مؤقت الجلسة</span>
          <div class="main-session-meta">اضبطا وقتاً خاصاً لكما</div>
        </button>
        <div class="top-bar-small-buttons">
          <button class="theme-toggle-btn" id="daynight-btn" type="button">
            <span class="btn-icon" id="daynight-icon">🌙</span>
            <span id="daynight-label">وضع ليلي</span>
          </button>
          <button class="theme-toggle-btn" id="theme-btn" type="button">
            <span class="btn-icon">🎨</span>
            تخصيص الألوان
          </button>
        </div>
      </div>
    </div>

    <div class="layout">
      <!-- العمود الأيسر -->
      <div class="left-col">
        <div class="card session-music" id="session-music-card">
            <!-- المحتوى لم يتغير -->
        </div>
        <div class="card loveboard">
            <!-- المحتوى لم يتغير -->
        </div>
        <div class="card account-card">
            <!-- المحتوى لم يتغير -->
        </div>
      </div>

      <!-- العمود الأيمن -->
      <div class="right-col">

  function typeWriter(text, el, speed) {
    speed = speed || 25;
    if (!el) return;
    el.textContent = "";
    el.classList.add("cursor");
    let i = 0;
    (function step() {
      if (i < text.length) {
        el.textContent += text.charAt(i++);
        setTimeout(step, speed);
      } else {
        el.classList.remove("cursor");
      }
    })();
